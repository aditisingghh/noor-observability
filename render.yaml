services:
  - type: web
    name: grafana
    env: docker
    plan: free
    dockerfilePath: ./services/grafana/Dockerfile

  - type: web
    name: prometheus
    env: docker
    plan: free
    dockerfilePath: ./services/prometheus/Dockerfile

  - type: web
    name: loki
    env: image
    plan: free
    image:
      url: grafana/loki:2.9.0

  - type: web
    name: tempo
    env: docker
    plan: free
    dockerfilePath: ./services/tempo/Dockerfile

  - type: web
    name: noor-backend
    env: docker
    plan: free
    dockerfilePath: ./services/backend/Dockerfile
    dockerContext: ./services/backend
    envVars:
      - key: PORT
        value: 4000